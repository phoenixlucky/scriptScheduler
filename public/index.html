<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeiScheduler 定时任务</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy-block">
          <p class="eyebrow">WeiScheduler</p>
          <h1>尉Python 定时任务</h1>
          <p class="hero-copy">
            选择指定 Python 环境、脚本路径与 Cron 时间表达式，在网页中创建和运行调度任务。
          </p>
          <div class="hero-stats">
            <div class="hero-stat">
              <span class="hero-stat-label">总任务</span>
              <strong id="hero-total">0</strong>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">运行中</span>
              <strong id="hero-running">0</strong>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-label">已启用</span>
              <strong id="hero-enabled">0</strong>
            </div>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-form">
          <div class="section-head">
            <h2 id="form-title">新建任务</h2>
            <button id="reset-form" class="ghost-button" type="button">清空</button>
          </div>

          <form id="task-form" class="task-form">
            <input type="hidden" id="task-id" name="id" />

            <label>
              任务名称
              <input id="name" name="name" placeholder="例如：日报生成" required />
            </label>

            <label>
              执行方式
              <select id="runnerType" name="runnerType">
                <option value="python">直接调用 Python</option>
                <option value="conda-name">Conda 环境名</option>
                <option value="conda-path">Conda 环境路径</option>
              </select>
            </label>

            <label id="command-path-row">
              <span class="field-label">Python 路径</span>
              <input
                id="commandPath"
                name="commandPath"
                placeholder="例如：D:\ProgramData\miniconda3\envs\py3143\python.exe"
              />
            </label>

            <label id="conda-target-row">
              Conda 环境名或路径
              <input
                id="condaTarget"
                name="condaTarget"
                placeholder="环境名如 myenv，或环境路径如 D:\miniconda3\envs\myenv"
              />
            </label>

            <label>
              脚本路径
              <input
                id="scriptPath"
                name="scriptPath"
                placeholder="例如：D:\jobs\report.py"
                required
              />
            </label>

            <label>
              启动参数
              <input id="args" name="args" placeholder='例如：--date "2026-03-19"' />
            </label>

            <label>
              时间参数名
              <input id="timeArgName" name="timeArgName" placeholder="例如：--run-time" />
            </label>

            <label>
              时间参数值
              <input id="timeArgValue" name="timeArgValue" type="datetime-local" />
            </label>

            <label>
              工作目录
              <input id="workingDirectory" name="workingDirectory" placeholder="可选，默认脚本所在目录" />
            </label>

            <label>
              Cron 时间表达式
              <input id="schedule" name="schedule" placeholder="例如：*/10 * * * *" required />
              <div class="cron-builder">
                <div class="cron-builder-grid">
                  <label>
                    分钟
                    <input id="cron-minute" placeholder="* / */10 / 0,30" />
                  </label>
                  <label>
                    小时
                    <input id="cron-hour" placeholder="* / 9 / 9-18" />
                  </label>
                  <label>
                    日
                    <input id="cron-day" placeholder="* / 1 / 1-5" />
                  </label>
                  <label>
                    月
                    <input id="cron-month" placeholder="* / 1 / 1,6,12" />
                  </label>
                  <label>
                    周
                    <input id="cron-weekday" placeholder="* / 1-5 / 0,6" />
                  </label>
                </div>
                <span class="field-help">自由组合 5 段时间，留空会按 `*` 处理。支持 `*`、`*/10`、`1,15,30`、`1-5` 这类 Cron 写法。</span>
              </div>
              <div class="cron-presets">
                <button class="ghost-button cron-preset" type="button" data-cron="*/5 * * * *">每 5 分钟</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 * * * *">每小时</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 */3 * * *">每 3 小时</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 */6 * * *">每 6 小时</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 9 * * *">每天 09:00</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 0 */3 * *">每 3 天</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 9 * * 1-5">工作日 09:00</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 0 1 * *">每月 1 日</button>
              </div>
              <span class="field-help">格式：分 时 日 月 周。示例：`*/10 * * * *` 每 10 分钟执行，`0 9 * * 1-5` 工作日 09:00 执行。</span>
            </label>

            <label class="checkbox-row">
              <input id="enabled" name="enabled" type="checkbox" checked />
              启用调度
            </label>

            <button class="primary-button" type="submit">保存任务</button>
          </form>
        </section>

        <section class="panel panel-list">
          <div class="section-head">
            <h2>任务列表</h2>
            <div class="toolbar-actions">
              <label class="auto-refresh-toggle">
                <input id="auto-refresh-enabled" type="checkbox" checked />
                自动刷新
              </label>
              <select id="auto-refresh-interval" class="toolbar-select">
                <option value="5000">5 秒</option>
                <option value="10000" selected>10 秒</option>
                <option value="30000">30 秒</option>
              </select>
              <input id="import-file" type="file" accept="application/json" hidden />
              <button id="import-tasks" class="ghost-button" type="button">导入</button>
              <button id="export-tasks" class="ghost-button" type="button">导出</button>
              <button id="refresh-list" class="ghost-button" type="button">刷新</button>
            </div>
          </div>
          <div id="task-list" class="task-list"></div>
        </section>
      </main>
    </div>

    <template id="task-template">
      <article class="task-card">
        <div class="task-card-head">
          <div class="task-title-group">
            <div class="task-title-row">
              <h3 class="task-name"></h3>
              <span class="task-frequency"></span>
            </div>
            <p class="task-meta"></p>
          </div>
          <div class="task-card-tools">
            <div class="task-quick-actions">
              <button class="ghost-button action-start" type="button">启动</button>
              <button class="ghost-button action-pause" type="button">暂停</button>
              <button class="ghost-button danger action-stop-head" type="button">终止</button>
              <button class="ghost-button action-run-once" type="button">立即执行1次</button>
            </div>
            <button class="ghost-button action-toggle" type="button">折叠详情</button>
            <span class="task-status"></span>
          </div>
        </div>
        <div class="task-body">
          <dl class="task-detail"></dl>
          <div class="task-actions">
            <button class="ghost-button action-edit" type="button">编辑</button>
            <button class="ghost-button action-run" type="button">立即执行</button>
            <button class="ghost-button action-clear-logs" type="button">清除日志</button>
            <button class="ghost-button danger action-stop" type="button">终止任务</button>
            <button class="ghost-button danger action-delete" type="button">删除</button>
          </div>
          <div class="log-block">
            <h4>最近日志</h4>
            <pre class="task-log">暂无运行记录</pre>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
