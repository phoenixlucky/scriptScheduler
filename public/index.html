<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeiPython 定时任务</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">WeiPython Scheduler</p>
          <h1>尉Python 定时任务</h1>
          <p class="hero-copy">
            选择指定 Python 环境、脚本路径与 Cron 时间表达式，在网页中创建和运行调度任务。
          </p>
        </div>
        <div class="hero-card">
          <div>示例 Cron</div>
          <code>0 9 * * 1-5</code>
          <span>工作日 09:00 执行</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="section-head">
            <h2 id="form-title">新建任务</h2>
            <button id="reset-form" class="ghost-button" type="button">清空</button>
          </div>

          <form id="task-form" class="task-form">
            <input type="hidden" id="task-id" name="id" />

            <label>
              任务名称
              <input id="name" name="name" placeholder="例如：日报生成" required />
            </label>

            <label>
              执行方式
              <select id="runnerType" name="runnerType">
                <option value="python">直接调用 Python</option>
                <option value="conda-name">Conda 环境名</option>
                <option value="conda-path">Conda 环境路径</option>
              </select>
            </label>

            <label id="command-path-row">
              Python/Conda 命令路径
              <input
                id="commandPath"
                name="commandPath"
                placeholder="Python 模式填写 python.exe；Conda 模式可选，留空时默认使用 conda"
              />
            </label>

            <label id="conda-target-row">
              Conda 环境名或路径
              <input
                id="condaTarget"
                name="condaTarget"
                placeholder="环境名如 myenv，或环境路径如 D:\miniconda3\envs\myenv"
              />
            </label>

            <label>
              脚本路径
              <input
                id="scriptPath"
                name="scriptPath"
                placeholder="例如：D:\jobs\report.py"
                required
              />
            </label>

            <label>
              启动参数
              <input id="args" name="args" placeholder='例如：--date "2026-03-19"' />
            </label>

            <label>
              时间参数名
              <input id="timeArgName" name="timeArgName" placeholder="例如：--run-time" />
            </label>

            <label>
              时间参数值
              <input id="timeArgValue" name="timeArgValue" type="datetime-local" />
            </label>

            <label>
              工作目录
              <input id="workingDirectory" name="workingDirectory" placeholder="可选，默认脚本所在目录" />
            </label>

            <label>
              Cron 时间表达式
              <input id="schedule" name="schedule" placeholder="例如：*/10 * * * *" required />
              <div class="cron-presets">
                <button class="ghost-button cron-preset" type="button" data-cron="*/5 * * * *">每 5 分钟</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 * * * *">每小时</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 */3 * * *">每 3 小时</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 9 * * *">每天 09:00</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 0 */3 * *">每 3 天</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 9 * * 1-5">工作日 09:00</button>
                <button class="ghost-button cron-preset" type="button" data-cron="0 0 1 * *">每月 1 日</button>
              </div>
              <span class="field-help">格式：分 时 日 月 周。示例：`*/10 * * * *` 每 10 分钟执行，`0 9 * * 1-5` 工作日 09:00 执行。</span>
            </label>

            <label class="checkbox-row">
              <input id="enabled" name="enabled" type="checkbox" checked />
              启用调度
            </label>

            <button class="primary-button" type="submit">保存任务</button>
          </form>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>任务列表</h2>
            <button id="refresh-list" class="ghost-button" type="button">刷新</button>
          </div>
          <div id="task-list" class="task-list"></div>
        </section>
      </main>
    </div>

    <template id="task-template">
      <article class="task-card">
        <div class="task-card-head">
          <div class="task-title-group">
            <div class="task-title-row">
              <h3 class="task-name"></h3>
              <span class="task-frequency"></span>
            </div>
            <p class="task-meta"></p>
          </div>
          <div class="task-card-tools">
            <button class="ghost-button action-toggle" type="button">折叠详情</button>
            <span class="task-status"></span>
          </div>
        </div>
        <div class="task-body">
          <dl class="task-detail"></dl>
          <div class="task-actions">
            <button class="ghost-button action-edit" type="button">编辑</button>
            <button class="ghost-button action-run" type="button">立即执行</button>
            <button class="ghost-button danger action-stop" type="button">终止任务</button>
            <button class="ghost-button danger action-delete" type="button">删除</button>
          </div>
          <div class="log-block">
            <h4>最近日志</h4>
            <pre class="task-log">暂无运行记录</pre>
          </div>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
